name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: ['dashboard/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 76317c04d814307dbb81c8fe71d287bb
          command: pages deploy . --project-name=playbook-generator --branch=main --commit-dirty=true
          workingDirectory: dashboard
